<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Training Portal | Live Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #f8f9fa; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; max-width: 940px; margin: 0 auto 20px; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1000; width: 400px; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 999; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #0070ba; color: white; }
        .btn-secondary { background: #6c757d; color: white; text-decoration: none; padding: 10px 15px; border-radius: 4px; font-size: 14px; font-weight: bold; margin-right: 10px; }
        .btn-danger { background: #dc3545; color: white; margin-top: 10px; width: 100%; }
        .close-btn { float: right; cursor: pointer; font-size: 20px; }
        .admin-badge { background: #ffc107; color: black; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: none; margin-right: 10px; }
    </style>
</head>
<body>

<div class="header-bar">
    <div>
        <a href="/index.html" class="btn-secondary">← Back to Home</a>
    </div>
    <div>
        <span id="adminBadge" class="admin-badge">COACH MODE ACTIVE</span>
        <button id="authBtn" class="btn btn-primary" onclick="toggleAuthField()">Coach Portal</button>
    </div>
</div>

<div id="calendar"></div>

<!-- Modal Overlay -->
<div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>

<!-- Login Modal -->
<div class="modal" id="loginModal">
    <span class="close-btn" onclick="closeAllModals()">&times;</span>
    <h3>Coach Authentication</h3>
    <div class="input-group">
        <label>Username</label>
        <input type="text" id="adminUser" value="coach">
    </div>
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="adminPass">
    </div>
    <button class="btn btn-primary" style="width: 100%;" onclick="submitLogin()">Login</button>
</div>

<!-- Public Parent Booking Modal -->
<div class="modal" id="bookingModal">
    <span class="close-btn" onclick="closeAllModals()">&times;</span>
    <h3 id="modalTitle">Book Session</h3>
    <p id="modalStatus"></p>
    
    <div id="parentFormFields">
        <div class="input-group"><label>Player Name</label><input type="text" id="playerName"></div>
        <div class="input-group"><label>Parent Email</label><input type="email" id="parentEmail"></div>
        <div id="paypal-button-container"></div>
        <button id="waitlistBtn" class="btn btn-primary" style="display:none; width:100%;" onclick="submitWaitlist()">Join Waitlist (Free)</button>
    </div>

    <button id="deleteSessionBtn" class="btn btn-danger" style="display:none;" onclick="deleteCurrentSession()">Delete This Entire Slot</button>
</div>

<!-- Coach Create Slot Modal -->
<div class="modal" id="createSlotModal">
    <span class="close-btn" onclick="closeAllModals()">&times;</span>
    <h3>Create New Training Time Slot</h3>
    <div class="input-group">
        <label>Event Title</label>
        <input type="text" id="newTitle" value="Elite Defense Clinic">
    </div>
    <div class="input-group">
        <label>Start Date & Time</label>
        <input type="datetime-local" id="newStart">
    </div>
    <div class="input-group">
        <label>End Date & Time</label>
        <input type="datetime-local" id="newEnd">
    </div>
    <div class="input-group">
        <label>Session Cost ($)</label>
        <input type="number" id="newPrice" value="45.00">
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="submitCreateSlot()">Publish Slot to Calendar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>

<script>
    let calendar;
    let selectedEvent = null;
    let adminToken = null;

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            selectable: true,
            
            // Mobile Optimization parameters placed securely here
            longPressDelay: 350,       
            selectLongPressDelay: 350, 
            
            validRange: function(nowDate) {
                return { start: nowDate, end: new Date(nowDate.valueOf()).setMonth(nowDate.getMonth() + 12) };
            },
            events: function(info, successCallback, failureCallback) {
                fetch('/api/sessions')
                    .then(res => res.json())
                    .then(data => {
                        const events = data.map(session => ({
                            id: session.id,
                            title: `${session.title} (${session.active_count}/30)`,
                            start: session.start_time,
                            end: session.end_time,
                            extendedProps: {
                                activeCount: session.active_count,
                                waitlistCount: session.waitlist_count,
                                price: session.price
                            }
                        }));
                        successCallback(events);
                    });
            },
            eventClick: function(info) {
                openBookingModal(info.event);
            },
            select: function(info) {
                if (adminToken) {
                    openCreateSlotModal(info.startStr);
                }
            }
        });
        calendar.render();
    });

    function toggleAuthField() {
        if(adminToken) {
            adminToken = null;
            document.getElementById('adminBadge').style.display = 'none';
            document.getElementById('authBtn').innerText = "Coach Portal";
            alert("Logged out of coach control panel.");
        } else {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('loginModal').style.display = 'block';
        }
    }

    function submitLogin() {
        fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('adminUser').value, password: document.getElementById('adminPass').value })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                adminToken = data.token;
                document.getElementById('adminBadge').style.display = 'inline-block';
                document.getElementById('authBtn').innerText = "Logout";
                closeAllModals();
                alert("Coach access verified. On phone: tap and hold a square to create slots. Tap an event banner to delete it.");
            } else {
                alert("Authorization failed.");
            }
        }).catch(() => alert("Could not complete authentication."));
    }

    function openBookingModal(event) {
        selectedEvent = event;
        const props = event.extendedProps;
        document.getElementById('modalTitle').innerText = event.title;
        document.getElementById('modalStatus').innerText = `Active Roster: ${props.activeCount}/30 | Waitlist: ${props.waitlistCount}/15`;

        document.getElementById('overlay').style.display = 'block';
        document.getElementById('bookingModal').style.display = 'block';

        if (adminToken) {
            document.getElementById('parentFormFields').style.display = 'none';
            document.getElementById('deleteSessionBtn').style.display = 'block';
        } else {
            document.getElementById('parentFormFields').style.display = 'block';
            document.getElementById('deleteSessionBtn').style.display = 'none';
            
            if (props.activeCount >= 30) {
                document.getElementById('paypal-button-container').style.display = 'none';
                document.getElementById('waitlistBtn').style.display = 'block';
            } else {
                document.getElementById('paypal-button-container').style.display = 'block';
                document.getElementById('waitlistBtn').style.display = 'none';
            }
        }
    }

    function openCreateSlotModal(dateStr) {
        document.getElementById('newStart').value = `${dateStr}T17:00`;
        document.getElementById('newEnd').value = `${dateStr}T18:30`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('createSlotModal').style.display = 'block';
    }

    function submitCreateSlot() {
        const payload = {
            token: adminToken,
            title: document.getElementById('newTitle').value,
            start_time: document.getElementById('newStart').value,
            end_time: document.getElementById('newEnd').value,
            price: parseFloat(document.getElementById('newPrice').value)
        };

        fetch('/api/admin/sessions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(() => {
            closeAllModals();
            calendar.refetchEvents();
        });
    }

    function deleteCurrentSession() {
        if(!confirm("Are you sure you want to permanently cancel this session and drop all registered players?")) return;

        fetch(`/api/admin/sessions/${selectedEvent.id}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: adminToken })
        }).then(res => res.json()).then(() => {
            closeAllModals();
            calendar.refetchEvents();
        });
    }

    function closeAllModals() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('bookingModal').style.display = 'none';
        document.getElementById('createSlotModal').style.display = 'none';
    }

    paypal.Buttons({
        createOrder: function(data, actions) {
            return actions.order.create({
                purchase_units: [{ amount: { value: selectedEvent.extendedProps.price.toString() } }]
            });
        },
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                submitBooking(details.id);
            });
        }
    }).render('#paypal-button-container');

    function submitBooking(orderId) {
        const payload = {
            session_id: selectedEvent.id,
            player_name: document.getElementById('playerName').value,
            parent_email: document.getElementById('parentEmail').value,
            paypal_order_id: orderId
        };

        fetch('/api/book', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(data => {
            alert(data.status === 'active' ? 'Spot confirmed!' : 'Roster full. Player placed on waitlist.');
            closeAllModals();
            calendar.refetchEvents(); // Soft refreshes grid updates flawlessly
        });
    }

    function submitWaitlist() {
        submitBooking(null);
    }
</script>
</body>
</html>
